<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact — Ronsenac Patrimoines</title>
<style>
  :root{
    --vert-pin: #3f6b45;
    --vert-clair: #eef4ea;
    --encre: #2a2a26;
    --erreur: #b3402a;
    --rayon: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:#fff;
    color: var(--encre);
    padding: 24px 16px 60px;
  }
  .carte{
    max-width: 560px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #dfe3d8;
    border-radius: var(--rayon);
    padding: 28px 26px;
  }
  .entete-logo{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom: 20px;
  }
  .entete-logo img{
    width: 56px;
    height: 56px;
    object-fit: contain;
  }
  h1{
    font-size: 1.35rem;
    margin: 0 0 2px;
    color: var(--vert-pin);
  }
  .sous-titre{
    margin: 0;
    font-size: 0.9rem;
    color: #6b6b62;
  }
  label.champ{
    display:block;
    font-size: 0.88rem;
    margin-bottom: 4px;
    color: #444;
  }
  .obligatoire{
    color: var(--erreur);
    margin-left: 2px;
  }
  input[type=text], input[type=email], select, textarea{
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d3d6cc;
    border-radius: 8px;
    font-size: 0.95rem;
    margin-bottom: 16px;
    font-family: inherit;
    background:#fff;
  }
  textarea{
    min-height: 130px;
    resize: vertical;
  }
  input:focus, select:focus, textarea:focus{
    outline: 2px solid var(--vert-pin);
    outline-offset: 1px;
  }
  .bouton-principal{
    width:100%;
    background: var(--vert-pin);
    color:#fff;
    border:none;
    border-radius: 8px;
    padding: 13px;
    font-size: 1rem;
    font-weight:600;
    cursor:pointer;
  }
  .bouton-principal:disabled{
    opacity:.6;
    cursor:default;
  }
  .bouton-secondaire{
    width:100%;
    background:#fff;
    color: var(--vert-pin);
    border:1.5px solid var(--vert-pin);
    border-radius: 8px;
    padding: 11px;
    font-size: 0.92rem;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
  }
  .erreur-champ{
    color: var(--erreur);
    font-size: 0.82rem;
    margin-top: -10px;
    margin-bottom: 12px;
    display:none;
  }
  .confirmation{
    background: var(--vert-clair);
    border: 1px solid #cfe0c9;
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--vert-pin);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="carte">
  <div class="entete-logo">
    <img class="logo-ronsenac" alt="Logo Ronsenac Patrimoines">
    <div>
      <h1>Nous contacter</h1>
      <p class="sous-titre">Ronsenac Patrimoines &amp; Astronomie Callisto</p>
    </div>
  </div>

  <form id="formContact" onsubmit="return false;">

    <!-- Honeypot anti-bot : invisible pour un humain, un robot le remplit souvent -->
    <div style="position:absolute; left:-9999px; top:-9999px;" aria-hidden="true">
      <label for="siteWeb">Ne pas remplir ce champ</label>
      <input type="text" id="siteWeb" name="siteWeb" tabindex="-1" autocomplete="off">
    </div>

    <label class="champ" for="destinataire">Destinataire<span class="obligatoire">*</span></label>
    <select id="destinataire" required>
      <option value="" disabled selected>-- Choisissez un destinataire --</option>
      <option value="ronsenac">Ronsenac Patrimoines</option>
      <option value="callisto">Astronomie Callisto</option>
    </select>

    <label class="champ" for="nom">Nom<span class="obligatoire">*</span></label>
    <input type="text" id="nom" required>

    <label class="champ" for="prenom">Prénom<span class="obligatoire">*</span></label>
    <input type="text" id="prenom" required>

    <label class="champ" for="email">Email<span class="obligatoire">*</span></label>
    <input type="email" id="email" required>

    <label class="champ" for="message">Message<span class="obligatoire">*</span></label>
    <textarea id="message" required></textarea>

    <p class="erreur-champ" id="messageErreur">Merci de compléter tous les champs obligatoires.</p>

    <div id="zoneAction">
      <button class="bouton-principal" id="btnEnvoyer" onclick="validerFormulaire()">Envoyer</button>
    </div>
  </form>
</div>

  document.querySelectorAll('.logo-ronsenac').forEach(img => {
    img.src = 'data:image/png;base64,' + LOGO_B64;
  });
  function emailValide(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
  }

  function validerFormulaire(){
    const destinataire = document.getElementById('destinataire').value;
    const nom = document.getElementById('nom').value.trim();
    const prenom = document.getElementById('prenom').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if(!destinataire || !nom || !prenom || !email || !message){
      document.getElementById('messageErreur').textContent = 'Merci de compléter tous les champs obligatoires.';
      document.getElementById('messageErreur').style.display = 'block';
      return;
    }
    if(!emailValide(email)){
      document.getElementById('messageErreur').textContent = 'Merci de vérifier le format de votre courriel (ex : nom@domaine.fr).';
      document.getElementById('messageErreur').style.display = 'block';
      return;
    }
    document.getElementById('messageErreur').style.display = 'none';

    const data = { destinataire, nom, prenom, email, message, piege: document.getElementById('siteWeb').value };

    const btn = document.getElementById('btnEnvoyer');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';

    fetch(URL_APPS_SCRIPT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    })
      .then(r => r.json())
      .then(resultat => {
        if (resultat && resultat.error) { throw new Error(resultat.error); }
        afficherConfirmation();
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = 'Envoyer';
        alert(err && err.message ? err.message : "Une erreur est survenue, merci de réessayer.");
        console.error(err);
      });
  }

  function afficherConfirmation(){
    document.querySelectorAll('#formContact input, #formContact select, #formContact textarea').forEach(el => el.disabled = true);
    document.getElementById('zoneAction').innerHTML =
      '<div class="confirmation">Merci, votre message a bien été envoyé !</div>' +
      '<button class="bouton-secondaire" onclick="reinitialiserFormulaire()">Envoyer un autre message</button>';
  }

  function reinitialiserFormulaire(){
    document.getElementById('formContact').reset();
    document.querySelectorAll('#formContact input, #formContact select, #formContact textarea').forEach(el => el.disabled = false);
    document.getElementById('messageErreur').style.display = 'none';
    document.getElementById('zoneAction').innerHTML =
      '<button class="bouton-principal" id="btnEnvoyer" onclick="validerFormulaire()">Envoyer</button>';
  }
</script>
